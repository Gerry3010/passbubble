# Standalone production compose file — uses the DockerHub image, no source needed.
# Usage: docker compose -f docker-compose.server.yml --profile production up -d
# See docs/server-deployment.md for the full setup guide.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pwmgr
      POSTGRES_USER: pwmgr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pwmgr"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  backend:
    image: gerre01/passbubble-server:latest
    environment:
      DATABASE_URL: postgres://pwmgr:${POSTGRES_PASSWORD}@postgres:5432/pwmgr?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: ${SERVER_PORT:-8765}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ENVIRONMENT: production
      # Email verification (optional — leave SMTP_HOST empty to disable)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backups:/data/backups
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: always
    profiles:
      - production
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:
  redis_data:
  backups:
  caddy_data:
  caddy_config:
