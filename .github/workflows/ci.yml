name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend (Go) ─────────────────────────────────────────────────────────────
  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pwmgr_test
          POSTGRES_USER: pwmgr
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      # The mailer's brand icon is a //go:embed asset generated from the SVG
      # single-source (not committed), so it must exist before the backend
      # compiles (tests + golangci-lint below).
      - name: Generate email brand icon
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          make mailer-icon

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://pwmgr:testpassword@localhost:5432/pwmgr_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
        run: go test -v -race -count=1 ./...

      - name: Lint backend
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend
          args: --timeout=5m

  # ── CLI (Go) ─────────────────────────────────────────────────────────────────
  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: cli/go.sum

      - name: Run CLI tests
        working-directory: cli
        run: go test -v -race -count=1 ./...

      - name: Build CLI
        working-directory: cli
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /tmp/pwmgr ./cmd/pwmgr

      - name: Lint CLI
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: cli
          args: --timeout=5m

  # ── Flutter ──────────────────────────────────────────────────────────────────
  test-flutter:
    name: Test Flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Sync SVG assets
        run: make sync-assets

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Flutter analyze
        working-directory: flutter_app
        run: flutter analyze

      # The hybrid-KEM FFI tests load the native c-shared lib; build it (host)
      # so they run instead of failing to dlopen a missing .so.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build native hybrid-KEM lib (host)
        run: make native-crypto

      - name: Flutter test
        working-directory: flutter_app
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: flutter_app/coverage/lcov.info

  # ── Docker build check ────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: passbubble-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
