name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Run all tests before release ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pwmgr_test
          POSTGRES_USER: pwmgr
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: |
            backend/go.sum
            cli/go.sum
      # The mailer brand icon is a //go:embed asset generated from the SVG
      # single-source (not committed) — generate it before the backend compiles.
      - name: Generate email brand icon
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          make mailer-icon
      - name: Backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://pwmgr:testpassword@localhost:5432/pwmgr_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
        run: go test -race -count=1 ./...
      - name: CLI tests
        working-directory: cli
        run: go test -race -count=1 ./...
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Sync SVG assets
        run: make sync-assets
      - name: Flutter tests
        working-directory: flutter_app
        run: flutter test

  # ── Build CLI binaries ────────────────────────────────────────────────────────
  build-cli:
    name: Build CLI (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: pwmgr-linux-amd64
          - goos: linux
            goarch: arm64
            name: pwmgr-linux-arm64
          - goos: darwin
            goarch: amd64
            name: pwmgr-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: pwmgr-darwin-arm64
          - goos: windows
            goarch: amd64
            name: pwmgr-windows-amd64.exe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: cli/go.sum
      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -o ../${{ matrix.name }} \
            ./cmd/pwmgr
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.name }}
          path: ${{ matrix.name }}

  # ── Build Flutter apps ────────────────────────────────────────────────────────
  build-flutter-linux:
    name: Build Flutter Linux
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: clang cmake ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev libsecret-1-dev
          version: 1.0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Sync SVG assets
        run: make sync-assets
      - name: Sync version from tag
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          sed -i "s/^version:.*/version: ${VER}+1/" flutter_app/pubspec.yaml
      - name: Build Linux
        working-directory: flutter_app
        run: flutter build linux --release
      - name: Package
        run: |
          cd flutter_app/build/linux/x64/release/bundle
          tar -czf passbubble-linux-x64.tar.gz *
          mv passbubble-linux-x64.tar.gz ../../../../..
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-linux
          path: flutter_app/passbubble-linux-x64.tar.gz

  build-flutter-macos:
    name: Build Flutter macOS
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Sync SVG assets
        run: make sync-assets
      - name: Sync version from tag
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          sed -i '' "s/^version:.*/version: ${VER}+1/" flutter_app/pubspec.yaml
      - name: Build macOS
        working-directory: flutter_app
        run: flutter build macos --release
      - name: Package
        run: |
          cd flutter_app/build/macos/Build/Products/Release
          zip -r passbubble-macos.zip passbubble.app
          mv passbubble-macos.zip ../../../../..
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-macos
          path: flutter_app/passbubble-macos.zip

  build-flutter-web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Sync SVG assets
        run: make sync-assets
      - name: Sync version from tag
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          sed -i "s/^version:.*/version: ${VER}+1/" flutter_app/pubspec.yaml
      - name: Build Web
        working-directory: flutter_app
        run: flutter build web --release --base-href /
      - name: Package
        run: |
          cd flutter_app/build/web
          tar -czf passbubble-web.tar.gz *
          mv passbubble-web.tar.gz ../..
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-web
          path: flutter_app/passbubble-web.tar.gz

  # ── Build & push Docker image ─────────────────────────────────────────────────
  docker:
    name: Docker Hub
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: gerre01/passbubble-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Notify pipepush of the Docker Hub deploy result ─────────────────────────
      - name: Notify pipepush
        if: always()                 # notify on success AND failure
        run: |
          curl -sf -X POST "$PIPEPUSH_SERVER/api/webhook" \
            -H "Content-Type: application/json" \
            -d "{
              \"token\": \"$PIPEPUSH_TOKEN\",
              \"status\": \"${{ job.status }}\",
              \"pipeline\": \"passbubble · Docker Hub\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"runId\": \"${{ github.run_number }}\"
            }"
        env:
          PIPEPUSH_TOKEN: ${{ secrets.PIPEPUSH_TOKEN }}
          PIPEPUSH_SERVER: ${{ vars.PIPEPUSH_SERVER }}

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-cli
      - build-flutter-linux
      - build-flutter-macos
      - build-flutter-web
      - docker
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "{cli-*,flutter-*}"
          merge-multiple: true
          path: release-assets

      - name: Create checksums
        run: |
          cd release-assets
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Passbubble ${{ github.ref_name }}

            Open-source, self-hosted password manager with E2E encryption and post-quantum security.

            ### Quick start

            ```bash
            # Pull the server
            docker pull gerre01/passbubble-server:${{ github.ref_name }}

            # Start the stack
            curl -O https://raw.githubusercontent.com/Gerry3010/passbubble/main/docker-compose.yml
            curl -O https://raw.githubusercontent.com/Gerry3010/passbubble/main/.env.example
            cp .env.example .env   # set POSTGRES_PASSWORD, JWT_SECRET, REDIS_PASSWORD
            docker compose up -d
            ```

            ### Downloads

            | Platform | File |
            |----------|------|
            | CLI — Linux x64 | `pwmgr-linux-amd64` |
            | CLI — Linux arm64 | `pwmgr-linux-arm64` |
            | CLI — macOS Intel | `pwmgr-darwin-amd64` |
            | CLI — macOS Apple Silicon | `pwmgr-darwin-arm64` |
            | CLI — Windows | `pwmgr-windows-amd64.exe` |
            | App — Linux | `passbubble-linux-x64.tar.gz` |
            | App — macOS | `passbubble-macos.zip` |
            | Web build | `passbubble-web.tar.gz` |

            Verify integrity with `checksums.txt` (SHA-256).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
