services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pwmgr
      POSTGRES_USER: pwmgr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pwmgr"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # web UI  → http://localhost:8025
      - "1025:1025"   # SMTP (only exposed for host-side tooling; backend uses internal network)
    restart: unless-stopped

  backend:
    build:
      # Context is the repo root so the build can pull in flutter_app/ as well
      # (the Flutter web app is built and embedded into the backend binary —
      # it's served at /web/* for users and /admin/* for the admin panel).
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgres://pwmgr:${POSTGRES_PASSWORD}@postgres:5432/pwmgr?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: ${SERVER_PORT:-8765}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Email verification — pre-wired to Mailpit for local dev.
      # Override APP_BASE_URL in .env if you use a different port or hostname.
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: noreply@passbubble.local
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8765}
    ports:
      - "${SERVER_PORT:-8765}:${SERVER_PORT:-8765}"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - backups:/data/backups
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  backups:
  caddy_data:
  caddy_config:
