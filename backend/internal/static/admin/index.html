Passbubble admin panel — standalone HTML/CSS/JS, no build step, no
framework, no dependencies. Talks directly to the same REST API the
CLI and the main vault web app use. No E2E crypto here: this page
only manages users/invitations via plain JWT-authenticated requests.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Passbubble Admin</title>
<style>
  :root {
    --bg: #212121;
    --surface: #2A2A2A;
    --surface-variant: #303030;
    --primary: #00E676;
    --primary-dim: #00C853;
    --primary-faint: #1B2A1F;
    --text: #E0E0E0;
    --text-dim: #9E9E9E;
    --error: #CF6679;
    --border: #424242;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
    min-height: 100vh;
  }
  a { color: var(--primary); }
  .hidden { display: none !important; }

  /* ── Login screen ─────────────────────────────────────────────── */
  #login-view {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .login-box {
    width: 100%;
    max-width: 360px;
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 24px;
  }
  .login-box h1 {
    color: var(--primary);
    font-size: 16px;
    letter-spacing: 2px;
    margin: 0 0 4px;
  }
  .login-box p.sub {
    color: var(--text-dim);
    font-size: 12px;
    margin: 0 0 20px;
  }

  /* ── Shared form elements ─────────────────────────────────────── */
  label {
    display: block;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 1px;
    margin: 14px 0 4px;
  }
  input[type=text], input[type=email], input[type=password] {
    width: 100%;
    background: var(--surface-variant);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
  }
  input:focus {
    outline: none;
    border-color: var(--primary);
    border-width: 1.5px;
  }
  button {
    font-family: inherit;
    cursor: pointer;
  }
  button.primary {
    width: 100%;
    background: var(--primary);
    color: #10231a;
    border: none;
    font-weight: 700;
    letter-spacing: 1px;
    font-size: 13px;
    padding: 12px;
    margin-top: 20px;
  }
  button.primary:hover { background: var(--primary-dim); }
  button.primary:disabled { opacity: 0.5; cursor: default; }
  button.small {
    background: transparent;
    color: var(--primary);
    border: 1px solid var(--border);
    font-size: 12px;
    padding: 8px 14px;
  }
  button.small:hover { border-color: var(--primary); }
  .error-box {
    border: 1px solid var(--error);
    color: var(--error);
    padding: 10px 12px;
    font-size: 12px;
    margin-top: 14px;
  }

  /* ── App shell ─────────────────────────────────────────────────── */
  #app-view header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
  }
  #app-view header h1 {
    color: var(--primary);
    font-size: 14px;
    letter-spacing: 2px;
    margin: 0;
  }
  #app-view header .who {
    color: var(--text-dim);
    font-size: 12px;
  }
  main {
    max-width: 880px;
    margin: 0 auto;
    padding: 20px;
  }
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 1px;
    padding: 10px 16px;
    border-bottom: 2px solid transparent;
  }
  .tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  th {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    font-size: 11px;
    letter-spacing: 1px;
    border: 1px solid var(--border);
  }
  .badge.admin { color: var(--primary); border-color: var(--primary); background: var(--primary-faint); }
  .badge.pending { color: var(--text-dim); }
  .badge.used { color: var(--primary); }
  .invite-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .invite-row input { flex: 1; }
  .invite-row button { padding: 0 16px; white-space: nowrap; }
  .token-cell {
    font-size: 12px;
    color: var(--text-dim);
    word-break: break-all;
  }
  .copy-btn {
    background: none;
    border: none;
    color: var(--primary);
    font-size: 11px;
    padding: 2px 6px;
  }
  .empty {
    color: var(--text-dim);
    font-size: 13px;
    padding: 16px 0;
  }
</style>
</head>
<body>

<div id="login-view">
  <div class="login-box">
    <h1>&gt; PASSBUBBLE ADMIN</h1>
    <p class="sub">Sign in with your admin account</p>
    <form id="login-form">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" required autocomplete="username">
      <label for="login-password">Master password</label>
      <input type="password" id="login-password" required autocomplete="current-password">
      <button type="submit" class="primary" id="login-submit">SIGN IN</button>
    </form>
    <div id="login-error" class="error-box hidden"></div>
  </div>
</div>

<div id="app-view" class="hidden">
  <header>
    <h1>&gt; PASSBUBBLE ADMIN</h1>
    <div class="who">
      <span id="who-text"></span>
      &nbsp;·&nbsp;
      <button class="copy-btn" id="logout-btn">LOGOUT</button>
    </div>
  </header>
  <main>
    <div class="tabs">
      <button class="tab active" data-tab="users">USERS</button>
      <button class="tab" data-tab="invitations">INVITATIONS</button>
    </div>

    <section id="tab-users">
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr></thead>
        <tbody id="users-body"></tbody>
      </table>
      <div id="users-empty" class="empty hidden">No users yet.</div>
      <div id="users-error" class="error-box hidden"></div>
    </section>

    <section id="tab-invitations" class="hidden">
      <div class="invite-row">
        <input type="email" id="invite-email" placeholder="email@example.com">
        <button class="small" id="invite-submit">+ INVITE</button>
      </div>
      <div id="invite-error" class="error-box hidden"></div>
      <table>
        <thead><tr><th>Email</th><th>Token</th><th>Status</th><th>Expires</th></tr></thead>
        <tbody id="invitations-body"></tbody>
      </table>
      <div id="invitations-empty" class="empty hidden">No invitations yet.</div>
    </section>
  </main>
</div>

<script type="module">
  const API = '/api/v1';
  let accessToken = sessionStorage.getItem('pb_admin_token') || null;

  const $ = (id) => document.getElementById(id);

  function showError(el, msg) {
    el.textContent = msg;
    el.classList.remove('hidden');
  }
  function hideError(el) {
    el.classList.add('hidden');
  }

  async function api(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    if (accessToken) headers['Authorization'] = `Bearer ${accessToken}`;
    const resp = await fetch(API + path, { ...opts, headers });
    if (resp.status === 401) {
      logout();
      throw new Error('Session expired — please sign in again.');
    }
    if (!resp.ok) {
      let msg = `Request failed (${resp.status})`;
      try {
        const body = await resp.json();
        if (body.error) msg = body.error;
      } catch (_) {}
      throw new Error(msg);
    }
    if (resp.status === 204) return null;
    return resp.json();
  }

  function logout() {
    accessToken = null;
    sessionStorage.removeItem('pb_admin_token');
    $('app-view').classList.add('hidden');
    $('login-view').classList.remove('hidden');
  }

  async function login(email, password) {
    const data = await api('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password }),
    });
    accessToken = data.access_token;
    sessionStorage.setItem('pb_admin_token', accessToken);
  }

  async function showApp() {
    const me = await api('/auth/me');
    $('who-text').textContent = `${me.name} (${me.role})`;
    $('login-view').classList.add('hidden');
    $('app-view').classList.remove('hidden');
    await Promise.all([loadUsers(), loadInvitations()]);
  }

  // ── Users tab ──────────────────────────────────────────────────
  async function loadUsers() {
    const body = $('users-body');
    const empty = $('users-empty');
    const errEl = $('users-error');
    hideError(errEl);
    try {
      const users = await api('/admin/users');
      body.innerHTML = '';
      empty.classList.toggle('hidden', users.length !== 0);
      for (const u of users) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(u.name)}</td>
          <td>${escapeHtml(u.email)}</td>
          <td><span class="badge ${u.role === 'admin' ? 'admin' : ''}">${escapeHtml(u.role)}</span></td>
          <td>${escapeHtml(u.status || '')}</td>
        `;
        body.appendChild(tr);
      }
    } catch (e) {
      body.innerHTML = '';
      empty.classList.add('hidden');
      showError(errEl, e.message);
    }
  }

  // ── Invitations tab ───────────────────────────────────────────
  async function loadInvitations() {
    const body = $('invitations-body');
    const empty = $('invitations-empty');
    try {
      const invitations = await api('/admin/invitations');
      body.innerHTML = '';
      empty.classList.toggle('hidden', invitations.length !== 0);
      for (const inv of invitations) {
        const tr = document.createElement('tr');
        const statusBadge = inv.used
          ? '<span class="badge used">USED</span>'
          : '<span class="badge pending">PENDING</span>';
        tr.innerHTML = `
          <td>${escapeHtml(inv.email)}</td>
          <td class="token-cell">${escapeHtml(inv.token)}
            <button class="copy-btn" data-copy="${escapeHtml(inv.token)}">COPY</button>
          </td>
          <td>${statusBadge}</td>
          <td>${escapeHtml(inv.expires_at || '')}</td>
        `;
        body.appendChild(tr);
      }
      body.querySelectorAll('[data-copy]').forEach((btn) => {
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(btn.dataset.copy);
          btn.textContent = 'COPIED';
          setTimeout(() => (btn.textContent = 'COPY'), 1200);
        });
      });
    } catch (e) {
      showError($('invite-error'), e.message);
    }
  }

  function escapeHtml(s) {
    return String(s)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;');
  }

  // ── Wiring ────────────────────────────────────────────────────
  $('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = $('login-submit');
    hideError($('login-error'));
    submitBtn.disabled = true;
    try {
      await login($('login-email').value, $('login-password').value);
      await showApp();
    } catch (err) {
      showError($('login-error'), err.message);
    } finally {
      submitBtn.disabled = false;
    }
  });

  $('logout-btn').addEventListener('click', logout);

  document.querySelectorAll('.tab').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      $('tab-users').classList.toggle('hidden', btn.dataset.tab !== 'users');
      $('tab-invitations').classList.toggle('hidden', btn.dataset.tab !== 'invitations');
    });
  });

  $('invite-submit').addEventListener('click', async () => {
    const email = $('invite-email').value.trim();
    if (!email) return;
    hideError($('invite-error'));
    try {
      await api('/admin/invite', { method: 'POST', body: JSON.stringify({ email }) });
      $('invite-email').value = '';
      await loadInvitations();
    } catch (e) {
      showError($('invite-error'), e.message);
    }
  });

  // ── Boot ──────────────────────────────────────────────────────
  if (accessToken) {
    showApp().catch(() => logout());
  }
</script>
</body>
</html>
