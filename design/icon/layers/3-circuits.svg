<?xml version="1.0" encoding="UTF-8"?>
<!-- Passbubble Liquid Glass icon — LAYER 3 (circuit traces, TRANSPARENT).
     Four traces + chip pads reaching the icon edges. NOTE: for a strict
     Liquid Glass icon these touch the bezel; pull them inward (or hide this
     layer) in Icon Composer if the system mask clips them awkwardly. -->
