  <!-- left -->
  <line x1="42"  y1="131" x2="14"  y2="131" stroke="#00ff41" stroke-width="1.5" opacity="0.70"/>
  <line x1="14"  y1="131" x2="14"  y2="157" stroke="#00ff41" stroke-width="1.5" opacity="0.50"/>
  <rect x="10"  y="127" width="8" height="8" fill="#00ff41" opacity="0.90"/>
