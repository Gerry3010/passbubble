  <!-- top -->
  <line x1="128" y1="44"  x2="128" y2="18"  stroke="#00ff41" stroke-width="1.5" opacity="0.70"/>
  <line x1="128" y1="18"  x2="154" y2="18"  stroke="#00ff41" stroke-width="1.5" opacity="0.50"/>
  <rect x="124" y="14" width="8" height="8" fill="#00ff41" opacity="0.90"/>
  <rect x="150" y="14" width="8" height="8" fill="#00ff41" opacity="0.50"/>
  <!-- right -->
  <line x1="215" y1="131" x2="244" y2="131" stroke="#00ff41" stroke-width="1.5" opacity="0.70"/>
  <line x1="244" y1="131" x2="244" y2="107" stroke="#00ff41" stroke-width="1.5" opacity="0.50"/>
  <rect x="240" y="127" width="8" height="8" fill="#00ff41" opacity="0.90"/>
  <rect x="240" y="103" width="8" height="8" fill="#00ff41" opacity="0.50"/>
  <!-- bottom -->
  <line x1="128" y1="213" x2="128" y2="242" stroke="#00ff41" stroke-width="1.5" opacity="0.70"/>
  <line x1="128" y1="242" x2="102" y2="242" stroke="#00ff41" stroke-width="1.5" opacity="0.50"/>
  <rect x="124" y="238" width="8" height="8" fill="#00ff41" opacity="0.90"/>
