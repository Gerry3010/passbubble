Browser-extension variant of the brand icon:
  * transparent background (no #0a0a0a block, no scanlines)
  * artwork scaled up to fill the frame (circuit traces dropped — they
    would clip off-canvas when enlarged and vanish at 16px anyway)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Radial gradient: upper-left bright spot → bubble dome effect -->
    <radialGradient id="bubble-fill" cx="36%" cy="30%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#00ff41" stop-opacity="0.18"/>
      <stop offset="55%"  stop-color="#00ff41" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0.01"/>
    </radialGradient>
  </defs>

  <!-- Whole artwork scaled up about the visual center (128,129) to fill the frame -->
  <g transform="translate(128 129) scale(1.3) translate(-128 -129)">

    <!-- Water bubble: organic 4-bezier blob, deliberately irregular -->
    <!-- Bounding box: x ≈42–220, y ≈42–216  |  Visual center: ≈(128,129) -->
    <path d="M 128,44
             C 181,42 220,83 215,131
             C 210,178 172,216 128,213
             C 84,216 42,178 42,131
             C 42,82 75,46 128,44 Z"
          fill="url(#bubble-fill)"
          stroke="#00ff41"
          stroke-width="2.4"
          filter="url(#glow)"/>

    <!-- Specular highlight: light-on-membrane arc, upper-left quadrant -->
    <path d="M 68,108 C 74,82 96,70 118,80"
          fill="none"
          stroke="#00ff41"
          stroke-width="2"
          stroke-linecap="round"
          opacity="0.62"
          filter="url(#glow)"/>

    <!-- Terminal prompt "> _" centered in bubble (visual center ≈128,129; baseline y=147) -->
    <text x="128" y="147"
          font-family="'Courier New', Courier, 'Lucida Console', monospace"
          font-size="54"
          font-weight="bold"
          fill="#00ff41"
          text-anchor="middle"
          filter="url(#glow)">&gt;&#32;_</text>
  </g>
</svg>
