<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect y="0" width="256" height="1" fill="#00ff41" opacity="0.03"/>
    </pattern>
    <!-- Radial gradient: upper-left bright spot → bubble dome effect -->
    <radialGradient id="bubble-fill" cx="36%" cy="30%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#00ff41" stop-opacity="0.18"/>
      <stop offset="55%"  stop-color="#00ff41" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0.01"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="#0a0a0a"/>
  <rect width="256" height="256" fill="url(#scanlines)"/>

  <!-- Water bubble: organic 4-bezier blob, deliberately irregular (not a circle, not a rect) -->
  <!-- Bounding box: x ≈42–220, y ≈42–216  |  Visual center: ≈(128,129) -->
  <path d="M 128,44
           C 181,42 220,83 215,131
           C 210,178 172,216 128,213
           C 84,216 42,178 42,131
           C 42,82 75,46 128,44 Z"
        fill="url(#bubble-fill)"
        stroke="#00ff41"
        stroke-width="2"
        filter="url(#glow)"/>

  <!-- Specular highlight: light-on-membrane arc, upper-left quadrant -->
  <path d="M 68,108 C 74,82 96,70 118,80"
        fill="none"
        stroke="#00ff41"
        stroke-width="1.8"
        stroke-linecap="round"
        opacity="0.62"
        filter="url(#glow)"/>

  <!-- Circuit trace: top (from ≈128,44 upward, then right) -->
  <line x1="128" y1="44"  x2="128" y2="18"  stroke="#00ff41" stroke-width="1.5" opacity="0.70"/>
  <line x1="128" y1="18"  x2="154" y2="18"  stroke="#00ff41" stroke-width="1.5" opacity="0.50"/>
  <rect x="124" y="14" width="8" height="8" fill="#00ff41" opacity="0.90"/>
  <rect x="150" y="14" width="8" height="8" fill="#00ff41" opacity="0.50"/>

  <!-- Circuit trace: right (from ≈215,131 rightward, then up) -->
  <line x1="215" y1="131" x2="244" y2="131" stroke="#00ff41" stroke-width="1.5" opacity="0.70"/>
  <line x1="244" y1="131" x2="244" y2="107" stroke="#00ff41" stroke-width="1.5" opacity="0.50"/>
  <rect x="240" y="127" width="8" height="8" fill="#00ff41" opacity="0.90"/>
  <rect x="240" y="103" width="8" height="8" fill="#00ff41" opacity="0.50"/>

  <!-- Circuit trace: bottom (from ≈128,213 downward, then left) -->
  <line x1="128" y1="213" x2="128" y2="242" stroke="#00ff41" stroke-width="1.5" opacity="0.70"/>
  <line x1="128" y1="242" x2="102" y2="242" stroke="#00ff41" stroke-width="1.5" opacity="0.50"/>
  <rect x="124" y="238" width="8" height="8" fill="#00ff41" opacity="0.90"/>
  <rect x="98"  y="238" width="8" height="8" fill="#00ff41" opacity="0.50"/>

  <!-- Circuit trace: left (from ≈42,131 leftward, then down) -->
  <line x1="42"  y1="131" x2="14"  y2="131" stroke="#00ff41" stroke-width="1.5" opacity="0.70"/>
  <line x1="14"  y1="131" x2="14"  y2="157" stroke="#00ff41" stroke-width="1.5" opacity="0.50"/>
  <rect x="10"  y="127" width="8" height="8" fill="#00ff41" opacity="0.90"/>
  <rect x="10"  y="153" width="8" height="8" fill="#00ff41" opacity="0.50"/>

  <!-- Terminal prompt "> _" centered in bubble (visual center ≈128,129; baseline y=147) -->
  <text x="128" y="147"
        font-family="'Courier New', Courier, 'Lucida Console', monospace"
        font-size="54"
        font-weight="bold"
        fill="#00ff41"
        text-anchor="middle"
        filter="url(#glow)">&gt;&#32;<tspan>_<animate attributeName="opacity" values="1;0;1" keyTimes="0;0.5;1" dur="1s" repeatCount="indefinite" calcMode="discrete"/></tspan></text>
</svg>
